<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トイエバ — 打てば返る万能ボックス</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500;600;700&family=Zen+Kaku+Gothic+Antique:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F1EFEA;
    --card: #FBFAF7;
    --ink: #2E2C28;
    --sub: #9B968C;
    --line: #E6E2D9;
    --accent: #95af9d;
    --accent-soft: #ECF1EC;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
    --sans: "Josefin Sans", "Zen Kaku Gothic Antique", "Hiragino Sans", "Noto Sans JP", "Yu Gothic UI", Meiryo, system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--sans); }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  .wrap { width: 100%; max-width: 560px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px; padding: 0 6px;
  }
  .mark {
    font-size: 15px; font-weight: 700; letter-spacing: .35em;
  }
  .hdr-btns { display: flex; align-items: center; gap: 8px; }
  #info, #bookmark {
    width: 26px; height: 26px; border-radius: 50%; flex: none;
    border: 1px solid var(--line); background: var(--card);
    color: var(--sub); font-family: var(--sans); font-size: 13px; font-style: italic;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  #info:hover, #info.on { color: var(--accent); border-color: var(--accent); }
  #bookmark:hover { color: var(--accent); border-color: var(--accent); }
  #bookmark:disabled { opacity: .35; cursor: default; }
  #bookmark:disabled:hover { color: var(--sub); border-color: var(--line); }
  #bookmark.saved { color: #fff; background: var(--accent); border-color: var(--accent); }
  #bookmark.pulse { animation: pulse .32s ease; }
  @keyframes pulse { 0% { transform: scale(1); } 45% { transform: scale(1.25); } 100% { transform: scale(1); } }

  .box {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 26px;
  }

  .inputbox { padding: 6px 26px; }
  #q {
    width: 100%;
    border: none; outline: none; background: transparent;
    font-family: var(--mono);
    font-size: 24px;
    text-align: left;
    padding: 20px 0;
    color: var(--ink);
    caret-color: var(--accent);
  }
  #q::placeholder { color: #B6BCC1; font-size: 24px; font-family: var(--sans); }
  .box.inputbox:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  /* 予測サジェスト */
  #suggest {
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
    margin-top: 0; max-height: 0; opacity: 0; overflow: hidden;
    transition: max-height .16s ease, opacity .12s ease, margin-top .16s ease;
  }
  #suggest.open { margin-top: 10px; max-height: 200px; opacity: 1; }
  .sg-chip {
    font-family: var(--mono); font-size: 12px;
    background: var(--accent-soft); border: 1px solid transparent; color: var(--accent);
    border-radius: 999px; padding: 6px 12px; cursor: pointer; font-weight: 600;
  }
  .sg-chip:hover { border-color: var(--accent); }
  .sg-chip .sg-hint { font-family: var(--sans); font-weight: 400; color: var(--sub); margin-left: 6px; }

  /* ブックマーク開閉トグル */
  #bmToggleWrap { display: flex; justify-content: center; margin-top: 10px; }
  #bmToggle {
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid var(--line); background: var(--card); color: var(--sub);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform .18s ease, color .15s ease, border-color .15s ease;
  }
  #bmToggle:hover { color: var(--accent); border-color: var(--accent); }
  #bmToggle.open svg { transform: rotate(180deg); }
  #bmToggle svg { transition: transform .18s ease; }

  /* 結果カード */
  #result { margin-top: 14px; overflow: hidden; }
  .res-inner { padding: 22px 26px 20px; }
  .res-label {
    font-size: 11px; font-weight: 600; letter-spacing: .12em;
    color: var(--accent); margin-bottom: 8px;
    text-align: left;
  }
  .res-big {
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    font-size: clamp(22px, 6.5vw, 36px);
    font-weight: 500;
    line-height: 1.25;
    word-break: break-all;
    cursor: pointer;
    display: flex; align-items: center; justify-content: flex-start; gap: 12px;
  }
  .res-big:hover { color: var(--accent); }
  .swatch {
    width: 36px; height: 36px; border-radius: 12px; flex: none;
    border: 1px solid rgba(0,0,0,.08);
    cursor: pointer;
  }
  .swatch:hover { transform: scale(1.06); }
  .copied {
    font-size: 12px; color: var(--accent); font-family: var(--sans);
    font-weight: 600; opacity: 0; transition: opacity .15s;
  }
  .copied.on { opacity: 1; }
  .res-rows { margin-top: 14px; border-top: 1px solid var(--line); }
  .res-row {
    display: flex; justify-content: space-between; gap: 16px;
    padding: 8px 0 0; margin-top: 8px;
    font-size: 13px;
  }
  .res-row .k { color: var(--sub); flex: none; }
  .res-row .v { font-family: var(--mono); text-align: right; word-break: break-all; }

  @media (prefers-reduced-motion: no-preference) {
    .res-inner { animation: rise .14s ease-out; }
    @keyframes rise { from { opacity: 0; transform: translateY(3px); } }
  }

  /* カスタムカラーピッカー */
  .cpanel { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--line); }
  .cp-row { margin-bottom: 12px; }
  .cp-row:last-child { margin-bottom: 0; }
  .cp-square {
    position: relative; width: 100%; height: 170px;
    border-radius: 16px; overflow: hidden; cursor: crosshair;
    touch-action: none;
    border: 1px solid var(--line);
  }
  .cp-square-white, .cp-square-black { position: absolute; inset: 0; }
  .cp-square-white { background: linear-gradient(to right, #fff, transparent); }
  .cp-square-black { background: linear-gradient(to top, #000, transparent); }
  .cp-cursor {
    position: absolute; width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,.25), 0 1px 3px rgba(0,0,0,.3);
    transform: translate(-50%, -50%); pointer-events: none;
  }
  .cp-controls { display: flex; align-items: center; gap: 14px; }
  .cp-hue-wrap { flex: 1; }
  .cp-hue {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 14px; border-radius: 999px; outline: none;
    background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
  }
  .cp-hue::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
    background: #fff; border: 3px solid var(--card);
    box-shadow: 0 0 0 1.5px var(--sub), 0 1px 3px rgba(0,0,0,.25);
    cursor: pointer;
  }
  .cp-hue::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%; background: #fff;
    border: 3px solid var(--card); box-shadow: 0 0 0 1.5px var(--sub), 0 1px 3px rgba(0,0,0,.25);
    cursor: pointer;
  }
  .cp-preview {
    width: 34px; height: 34px; border-radius: 12px; flex: none;
    border: 1px solid rgba(0,0,0,.08);
  }
  .cp-hexrow { display: flex; align-items: center; gap: 8px; }
  .cp-hash {
    font-family: var(--mono); color: var(--sub); font-size: 15px;
    background: var(--bg); border-radius: 999px; width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center; flex: none;
  }
  .cp-hex {
    flex: 1; min-width: 0; font-family: var(--mono); font-size: 15px; letter-spacing: .04em;
    text-transform: uppercase; border: 1px solid var(--line); background: var(--bg);
    border-radius: 999px; padding: 7px 14px; outline: none; color: var(--ink);
  }
  .cp-hex:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .cp-apply {
    font-family: var(--sans); font-size: 12.5px; font-weight: 600;
    border: 1px solid var(--accent); background: var(--accent); color: #fff;
    border-radius: 999px; padding: 8px 16px; cursor: pointer; flex: none;
  }
  .cp-apply:hover { opacity: .88; }
  .cp-presets { display: flex; flex-wrap: wrap; gap: 8px; }
  .cp-swatch {
    width: 26px; height: 26px; border-radius: 9px; cursor: pointer;
    border: 1px solid rgba(0,0,0,.08);
  }
  .cp-swatch:hover { transform: scale(1.1); }

  /* ToDoパネル */
  .tpanel { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--line); }
  .tp-add input {
    width: 100%; border: 1px solid var(--line); background: var(--bg);
    border-radius: 999px; padding: 10px 16px; font-size: 14px; outline: none;
    color: var(--ink); font-family: var(--sans);
  }
  .tp-add input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .tp-list { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
  .tp-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 16px; background: var(--bg);
  }
  .tp-check {
    width: 20px; height: 20px; border-radius: 50%; flex: none;
    border: 2px solid var(--sub); cursor: pointer; background: transparent;
    display: flex; align-items: center; justify-content: center; color: transparent;
  }
  .tp-item.done .tp-check { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tp-text { flex: 1; font-size: 14px; word-break: break-all; cursor: pointer; }
  .tp-item.done .tp-text { color: var(--sub); text-decoration: line-through; }
  .tp-del {
    flex: none; width: 22px; height: 22px; border-radius: 50%; border: none;
    background: transparent; color: var(--sub); cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
  }
  .tp-del:hover { color: #b5544a; }
  .tp-empty { text-align: center; font-size: 12.5px; color: var(--sub); padding: 14px 0 4px; }
  .tp-empty.hide { display: none; }

  /* ヒント (折りたたみ) */
  #hints {
    margin-top: 0; max-height: 0; opacity: 0; overflow: hidden;
    display: flex; flex-wrap: wrap; gap: 8px;
    transition: max-height .22s ease, opacity .18s ease, margin-top .22s ease;
  }
  #hints.open { margin-top: 14px; max-height: 300px; opacity: 1; }
  .chip {
    font-family: var(--mono); font-size: 12.5px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 24px; padding: 7px 14px;
    cursor: pointer; color: var(--sub);
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .hint-note { width: 100%; font-size: 11.5px; color: var(--sub); margin-bottom: 2px; padding: 0 2px; }

  /* 履歴 */
  #histwrap { margin-top: 28px; display: none; }
  #histwrap.show { display: block; }
  .hist-head {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 0 10px; margin-bottom: 8px;
  }
  .hist-title { font-size: 11px; font-weight: 600; letter-spacing: .12em; color: var(--sub); }
  #clear {
    font-size: 11px; color: var(--sub); background: none; border: none;
    cursor: pointer; font-family: var(--sans);
  }
  #clear:hover { color: var(--accent); }
  #hist { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  #hist li {
    display: flex; justify-content: space-between; gap: 12px;
    padding: 11px 18px; font-size: 13px; cursor: pointer;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 20px;
  }
  #hist li:hover { background: var(--accent-soft); border-color: var(--accent); }
  #hist .hq { font-family: var(--mono); color: var(--sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #hist .ha { font-family: var(--mono); flex: none; max-width: 55%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  button:focus-visible, .chip:focus-visible, .res-big:focus-visible, #hist li:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }
  footer { margin-top: 32px; font-size: 11px; color: var(--sub); text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="mark">トイエバ</div>
    <div class="hdr-btns">
      <button id="bookmark" type="button" title="この結果をブックマーク" disabled>
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button id="info" type="button" title="使い方の例を見る">i</button>
    </div>
  </header>

  <div class="box inputbox">
    <input id="q" type="text" autocomplete="off" spellcheck="false" autofocus
      placeholder="例: 3980 + 10%">
  </div>

  <div id="suggest"></div>

  <div id="bmToggleWrap" hidden>
    <button id="bmToggle" type="button" title="ブックマークを見る">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </button>
  </div>

  <div id="result" class="box" hidden>
    <div class="res-inner">
      <div class="res-label" id="rlabel"></div>
      <div class="res-big" id="rbig" tabindex="0" role="button" title="クリックでコピー"></div>
      <div class="res-rows" id="rrows"></div>
      <div class="cpanel" id="cpanel" hidden>
        <div class="cp-row">
          <div class="cp-square" id="cpSquare">
            <div class="cp-square-white"></div>
            <div class="cp-square-black"></div>
            <div class="cp-cursor" id="cpCursor"></div>
          </div>
        </div>
        <div class="cp-row cp-controls">
          <div class="cp-hue-wrap">
            <input type="range" id="cpHue" min="0" max="360" value="150" class="cp-hue" aria-label="色相">
          </div>
          <div class="cp-preview" id="cpPreview"></div>
        </div>
        <div class="cp-row cp-hexrow">
          <span class="cp-hash">#</span>
          <input type="text" id="cpHex" maxlength="6" class="cp-hex" spellcheck="false" autocomplete="off" aria-label="HEXコード">
          <button type="button" id="cpApply" class="cp-apply">決定</button>
        </div>
        <div class="cp-row cp-presets" id="cpPresets"></div>
      </div>
      <div class="tpanel" id="tpanel" hidden>
        <div class="tp-add">
          <input id="tpInput" type="text" placeholder="新しいToDoを入力してEnter" autocomplete="off" spellcheck="false">
        </div>
        <div class="tp-list" id="tpList"></div>
        <div class="tp-empty" id="tpEmpty">まだ何もありません</div>
      </div>
    </div>
  </div>

  <div id="hints">
    <div class="hint-note">たとえばこんな入力ができる (クリックで試す):</div>
  </div>

  <div id="histwrap">
    <div class="hist-head">
      <div class="hist-title">ブックマーク</div>
      <button id="clear">全部消去</button>
    </div>
    <ul id="hist"></ul>
  </div>

  <footer>© 2026 Super Hiko14</footer>
</div>
<script>
// ===================== トイエバ logic =====================
// interpret(query) -> {label, big, rows:[[k,v],...], swatch?} | null

// ---------- 数値フォーマット
function fmt(n) {
  if (typeof n !== 'number' || !isFinite(n)) return '—';
  const a = Math.abs(n);
  if (a !== 0 && (a >= 1e15 || a < 1e-9)) return n.toExponential(6);
  const r = Number(n.toPrecision(12));
  return r.toLocaleString('en-US', { maximumFractionDigits: 10 });
}
function num(s) { return parseFloat(String(s).replace(/,/g, '')); }

// ---------- 数式パーサ (shunting-yard)
const FN = {
  sqrt: Math.sqrt, cbrt: Math.cbrt, sin: Math.sin, cos: Math.cos, tan: Math.tan,
  log: Math.log10, ln: Math.log, abs: Math.abs, exp: Math.exp,
  round: Math.round, floor: Math.floor, ceil: Math.ceil,
};
const CONST = { pi: Math.PI, e: Math.E };

function tokenize(src) {
  const toks = []; let i = 0;
  src = src.replace(/[×✕＊]/g, '*').replace(/[÷]/g, '/').replace(/[−–ー]/g, '-')
           .replace(/[（]/g, '(').replace(/[）]/g, ')').replace(/π/g, 'pi')
           .replace(/[＋]/g, '+').replace(/[／]/g, '/');
  // √16, √(16+9), ∛27 のような記法を sqrt(16), sqrt(16+9), cbrt(27) に展開
  src = src.replace(/√\(/g, 'sqrt(').replace(/∛\(/g, 'cbrt(');
  src = src.replace(/√\s*([0-9]+(?:\.[0-9]+)?)/g, 'sqrt($1)');
  src = src.replace(/∛\s*([0-9]+(?:\.[0-9]+)?)/g, 'cbrt($1)');
  while (i < src.length) {
    const c = src[i];
    if (c === ' ' || c === '\t') { i++; continue; }
    if (/[0-9.]/.test(c)) {
      let j = i;
      while (j < src.length && /[0-9.,]/.test(src[j])) j++;
      const v = num(src.slice(i, j));
      if (isNaN(v)) return null;
      toks.push({ t: 'num', v }); i = j; continue;
    }
    if (/[a-z]/i.test(c)) {
      let j = i;
      while (j < src.length && /[a-z]/i.test(src[j])) j++;
      toks.push({ t: 'id', v: src.slice(i, j).toLowerCase() }); i = j; continue;
    }
    if ('+-*/^%()'.includes(c)) { toks.push({ t: c }); i++; continue; }
    return null;
  }
  return toks;
}

function applyOp(st, op) {
  if (op.t === 'fn') { const a = st.pop(); if (a === undefined) throw 0; st.push(FN[op.v](a)); return; }
  if (op.t === 'neg') { const a = st.pop(); if (a === undefined) throw 0; st.push(-a); return; }
  const b = st.pop(), a = st.pop();
  if (a === undefined || b === undefined) throw 0;
  switch (op.t) {
    case '+': st.push(a + b); break;
    case '-': st.push(a - b); break;
    case '*': st.push(a * b); break;
    case '/': st.push(a / b); break;
    case '%': st.push(a % b); break;
    case '^': st.push(Math.pow(a, b)); break;
    default: throw 0;
  }
}

function evalMath(src) {
  const toks = tokenize(src);
  if (!toks || !toks.length || !toks.some(t => t.t === 'num')) return null;
  const prec = { '+': 1, '-': 1, '*': 2, '/': 2, '%': 2, '^': 3, neg: 4 };
  const rightAssoc = { '^': 1, neg: 1 };
  const out = [], ops = [];
  let lastWasValue = false;
  try {
    for (const tk of toks) {
      if (tk.t === 'num') { out.push(tk.v); lastWasValue = true; }
      else if (tk.t === 'id') {
        if (tk.v in CONST) { out.push(CONST[tk.v]); lastWasValue = true; }
        else if (tk.v in FN) { ops.push({ t: 'fn', v: tk.v }); lastWasValue = false; }
        else return null;
      }
      else if (tk.t === '(') { ops.push(tk); lastWasValue = false; }
      else if (tk.t === ')') {
        while (ops.length && ops[ops.length - 1].t !== '(') applyOp(out, ops.pop());
        if (!ops.length) return null;
        ops.pop();
        if (ops.length && ops[ops.length - 1].t === 'fn') applyOp(out, ops.pop());
        lastWasValue = true;
      }
      else {
        let op = tk.t;
        if (!lastWasValue) {
          if (op === '-') op = 'neg';
          else if (op === '+') continue;
          else return null;
        }
        while (ops.length) {
          const top = ops[ops.length - 1];
          if (top.t === '(' || top.t === 'fn') break;
          if (prec[top.t] > prec[op] || (prec[top.t] === prec[op] && !rightAssoc[op])) applyOp(out, ops.pop());
          else break;
        }
        ops.push({ t: op });
        lastWasValue = false;
      }
    }
    while (ops.length) {
      const top = ops.pop();
      if (top.t === '(') return null;
      applyOp(out, top);
    }
  } catch (e) { return null; }
  if (out.length !== 1 || typeof out[0] !== 'number' || isNaN(out[0])) return null;
  return out[0];
}

// ---------- 単位変換
const UNIT_ALIAS = {
  inch: 'in', inches: 'in', feet: 'ft', foot: 'ft', mile: 'mi', miles: 'mi',
  meter: 'm', meters: 'm', gram: 'g', grams: 'g', pound: 'lb', lbs: 'lb', pounds: 'lb',
  liter: 'l', liters: 'l', litre: 'l', sec: 's', secs: 's', seconds: 's', second: 's',
  mins: 'min', minute: 'min', minutes: 'min', hr: 'h', hrs: 'h', hour: 'h', hours: 'h',
  day: 'd', days: 'd', '℃': 'c', '°c': 'c', '℉': 'f', '°f': 'f', kib: 'kb', mib: 'mb', gib: 'gb', tib: 'tb',
};
const UNITS = {
  mm: ['長さ', 0.001], cm: ['長さ', 0.01], m: ['長さ', 1], km: ['長さ', 1000],
  in: ['長さ', 0.0254], ft: ['長さ', 0.3048], yd: ['長さ', 0.9144], mi: ['長さ', 1609.344],

  if (/^(tomorrow|明日|あした)$/i.test(s)) { const t = today0(); t.setDate(t.getDate() + 1); return t; }
  if (/^(yesterday|昨日|きのう)$/i.test(s)) { const t = today0(); t.setDate(t.getDate() - 1); return t; }
  let m = s.match(/^(\d{4})[-/.年](\d{1,2})[-/.月](\d{1,2})日?$/);
  if (m) return validDate(+m[1], +m[2], +m[3]);

      return { label: '日付の計算', big: dstr(r),

const rnd = (n) => {

function tryGen(q) {

  }

function textStats(q) {

    rows: [['空白を除く', noSpace + ' 文字'], ['単語数', words + ' 語'], ['UTF-8', bytes + ' バイト'],
           ...(lines > 1 ? [['行数', lines + ' 行']] : [])] };
}

  if ((r = tryPercent(q))) return r;
  if ((r = tryDate(q))) return r;
  if ((r = tryUnits(q))) return r;

// ===================== HSV <-> HEX =====================
function hsvToHex(h, s, v) {

  else if (h < 120) [r, g, b] = [x, c, 0];
  else if (h < 180) [r, g, b] = [0, c, x];
  else if (h < 240) [r, g, b] = [0, x, c];
  else if (h < 300) [r, g, b] = [x, 0, c];
  else [r, g, b] = [c, 0, x];
  const R = Math.round((r + m) * 255), G = Math.round((g + m) * 255), B = Math.round((b + m) * 255);
  return '#' + [R, G, B].map(n => n.toString(16).padStart(2, '0')).join('');
}
function hexToHsv(hex) {

  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  const r = parseInt(hex.slice(0, 2), 16) / 255, g = parseInt(hex.slice(2, 4), 16) / 255, b = parseInt(hex.slice(4, 6), 16) / 255;
  const mx = Math.max(r, g, b), mn = Math.min(r, g, b), d = mx - mn;
  let h = 0;
  if (d !== 0) {
    if (mx === r) h = 60 * (((g - b) / d) % 6);
    else if (mx === g) h = 60 * ((b - r) / d + 2);
    else h = 60 * ((r - g) / d + 4);
  }
  if (h < 0) h += 360;
  return { h, s: mx === 0 ? 0 : d / mx, v: mx };
}

  const y = Math.min(Math.max(clientY - r.top, 0), r.height);
  cp.s = r.width ? x / r.width : 0;
  cp.v = r.height ? 1 - y / r.height : 0;
}
cpSquare.addEventListener('pointerdown', e => {
  e.preventDefault();
  cpSquare.setPointerCapture(e.pointerId);
  squareToSV(e.clientX, e.clientY);
  pushLive(paintPicker());
});
cpSquare.addEventListener('pointermove', e => {
  if (e.buttons !== 1) return;
  e.preventDefault();
  squareToSV(e.clientX, e.clientY);
  pushLive(paintPicker());
});
cpSquare.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });
cpSquare.addEventListener('touchstart', e => { e.preventDefault(); }, { passive: false });
cpHue.addEventListener('input', () => { cp.h = +cpHue.value; pushLive(paintPicker()); });
cpHex.addEventListener('input', () => {
  const v = cpHex.value.replace(/[^0-9a-f]/gi, '').slice(0, 6);
  if (v !== cpHex.value) cpHex.value = v;
  if (v.length === 6 || v.length === 3) {
    const hsv = hexToHsv(v);
    cp.h = hsv.h; cp.s = hsv.s; cp.v = hsv.v;
    cpSquare.style.backgroundColor = 'hsl(' + cp.h.toFixed(0) + ',100%,50%)';
    cpCursor.style.left = (cp.s * 100) + '%';
    cpCursor.style.top = ((1 - cp.v) * 100) + '%';
    cpHue.value = Math.round(cp.h);
    const hex = '#' + (v.length === 3 ? v.split('').map(c => c + c).join('') : v);
    cpPreview.style.background = hex;
    pushLive(hex);
  }
});
cpApply.addEventListener('click', () => { closePanel(); qEl.focus(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && pickerOpen) closePanel(); });
document.addEventListener('pointerdown', e => {
  if (!pickerOpen) return;
  if (cpanel.contains(e.target) || bigEl.contains(e.target)) return;
  closePanel();
});

// ===================== ToDo =====================
function saveTodos() { store.set('sokuto-todos', todos); }
function addTodo(text) {
  todos.unshift({ id: 't' + Date.now() + Math.random().toString(36).slice(2, 7), text, done: false });
  saveTodos();
}
function toggleTodo(id) { const t = todos.find(x => x.id === id); if (t) { t.done = !t.done; saveTodos(); } }
function deleteTodo(id) { todos = todos.filter(x => x.id !== id); saveTodos(); }
function checkTodoByName(name) {
  const nl = name.toLowerCase();
  let m = todos.find(t => !t.done && t.text.toLowerCase().includes(nl));
  if (!m) m = todos.find(t => t.text.toLowerCase().includes(nl));
  if (!m) return null;
  m.done = true; saveTodos();
  return m.text;
}
function removeTodoByName(name) {
  const nl = name.toLowerCase();
  const m = todos.find(t => t.text.toLowerCase().includes(nl));
  if (!m) return null;
  todos = todos.filter(t => t.id !== m.id);
  saveTodos();
  return m.text;
}
function refreshTodoHeader() {
  const total = todos.length, done = todos.filter(t => t.done).length;
  bigEl.innerHTML = '<span class="bigtext">' + (total ? (done + ' / ' + total + ' 完了') : 'まずは1件追加しよう') + '</span>';
}
function renderTodoList() {
  tpEmpty.classList.toggle('hide', todos.length > 0);
  const sorted = [...todos].sort((a, b) => (a.done === b.done) ? 0 : (a.done ? 1 : -1));
  tpList.innerHTML = sorted.map(t =>
    '<div class="tp-item ' + (t.done ? 'done' : '') + '" data-id="' + t.id + '">' +
      '<button type="button" class="tp-check" aria-label="完了切り替え">✓</button>' +
      '<span class="tp-text">' + esc(t.text) + '</span>' +
      '<button type="button" class="tp-del" aria-label="削除">×</button>' +
    '</div>'
  ).join('');
  refreshTodoHeader();
}
tpList.addEventListener('click', e => {
  const item = e.target.closest('.tp-item'); if (!item) return;
  const id = item.dataset.id;
  if (e.target.closest('.tp-del')) { deleteTodo(id); renderTodoList(); return; }
  toggleTodo(id); renderTodoList();
});
tpInput.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const t = tpInput.value.trim(); if (!t) return;
  addTodo(t); tpInput.value = ''; renderTodoList();
});

function flashCard(label, big) {
  labelEl.textContent = label;
  bigEl.innerHTML = '<span class="bigtext">' + esc(big) + '</span>';
  rowsEl.innerHTML = ''; rowsEl.style.display = 'none';
  tpanel.hidden = true;
  resEl.hidden = false;
  bookmarkBtn.disabled = true; bookmarkBtn.classList.remove('saved');
}
function commitTodoAdd(text) {
  addTodo(text);
  flashCard('ToDo追加 ✓', text);
  qEl.value = ''; hideSuggest();
  setTimeout(() => { if (!qEl.value.trim()) render(null); }, 900);
}
function commitTodoCheck(text) {
  const matched = checkTodoByName(text);
  if (matched) flashCard('ToDo完了 ✓', matched);
  else flashCard('ToDo', '「' + text + '」は見つかりませんでした');
  qEl.value = ''; hideSuggest();
  setTimeout(() => { if (!qEl.value.trim()) render(null); }, 1100);
}
function commitTodoRemove(text) {
  const matched = removeTodoByName(text);
  if (matched) flashCard('ToDo削除 ✓', matched);
  else flashCard('ToDo', '「' + text + '」は見つかりませんでした');
  qEl.value = ''; hideSuggest();
  setTimeout(() => { if (!qEl.value.trim()) render(null); }, 1100);
}

// ===================== 描画 =====================
function render(r) {
  current = r;
  if (!r) {
    resEl.hidden = true;
    tpanel.hidden = true;
    if (pickerOpen) closePanel();
    updateBookmarkBtn();
    return;
  }
  resEl.hidden = false;
  if (r.todoView) {
    labelEl.textContent = 'ToDo';
    rowsEl.style.display = 'none'; rowsEl.innerHTML = '';
    tpanel.hidden = false;
    renderTodoList();
    if (pickerOpen) closePanel();
  } else {
    tpanel.hidden = true;
    labelEl.textContent = r.label;
    bigEl.innerHTML =
      (r.swatch ? '<span class="swatch" style="background:' + esc(r.swatch) + '" title="クリックでカラーピッカーを開く"></span>' : '') +
      '<span class="bigtext">' + esc(r.big) + '</span>' +
      '<span class="copied" id="copied">コピーしました ✓</span>';
    rowsEl.innerHTML = (r.rows || []).map(([k, v]) =>
      '<div class="res-row"><span class="k">' + esc(k) + '</span><span class="v">' + esc(v) + '</span></div>'
    ).join('');
    rowsEl.style.display = (r.rows && r.rows.length) ? '' : 'none';
    if (!r.pickerTrigger && !r.swatchClickable && pickerOpen) closePanel();
  }
  updateBookmarkBtn();
}
function evaluate() {
  const q = qEl.value;
  render(q.trim() ? interpret(q) : null);
}

// ---- コピー / カラーピッカー起動
async function copyBig() {
  if (!current) return;
  try {
    await navigator.clipboard.writeText(current.big);
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = current.big; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
  }
  const c = $('#copied');
  if (c) { c.classList.add('on'); setTimeout(() => c.classList.remove('on'), 1200); }
}
bigEl.addEventListener('click', e => {
  if (!current) return;
  if (current.pickerTrigger) { openPanel(current.pickerStart); return; }
  if (current.swatchClickable && e.target.closest('.swatch')) { openPanel(current.pickerStart); return; }
  if (current.todoView) return;
  copyBig();
});
bigEl.addEventListener('keydown', e => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  e.preventDefault();
  if (!current) return;
  if (current.pickerTrigger || current.swatchClickable) { openPanel(current.pickerStart); return; }
  if (current.todoView) return;
  copyBig();
});

// ===================== ブックマーク =====================
function bookmarkable(r) { return r && !r.pickerTrigger && !r.todoView && !r.todoAdd && !r.todoCheck && !r.todoRemove; }
function updateBookmarkBtn() {
  if (!bookmarkable(current)) {
    bookmarkBtn.disabled = true; bookmarkBtn.classList.remove('saved');
    return;
  }
  bookmarkBtn.disabled = false;
  const q = qEl.value.trim();
  bookmarkBtn.classList.toggle('saved', bookmarks.some(b => b.q === q));
}
function renderBookmarks() {
  bmToggleWrap.hidden = bookmarks.length === 0;
  if (bookmarks.length === 0) { histWrap.classList.remove('show'); bmToggle.classList.remove('open'); }
  histEl.innerHTML = bookmarks.map((h, i) =>
    '<li tabindex="0" data-i="' + i + '"><span class="hq">' + esc(h.q) + '</span><span class="ha">' + esc(h.a) + '</span></li>'
  ).join('');
}
function toggleBookmark() {
  if (bookmarkBtn.disabled || !current) return;
  const q = qEl.value.trim(); if (!q) return;
  const idx = bookmarks.findIndex(b => b.q === q);
  if (idx >= 0) bookmarks.splice(idx, 1);
  else {
    bookmarks.unshift({ q, a: current.big, label: current.label });
    if (bookmarks.length > 50) bookmarks.length = 50;
  }
  renderBookmarks();
  store.set('sokuto-bookmarks', bookmarks);
  updateBookmarkBtn();
  bookmarkBtn.classList.add('pulse');
  setTimeout(() => bookmarkBtn.classList.remove('pulse'), 320);
}
bookmarkBtn.addEventListener('click', toggleBookmark);
histEl.addEventListener('click', e => {
  const li = e.target.closest('li'); if (!li) return;
  qEl.value = bookmarks[+li.dataset.i].q;
  evaluate(); qEl.focus();
  histWrap.classList.remove('show'); bmToggle.classList.remove('open');
});
histEl.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const li = e.target.closest('li'); if (!li) return;
  qEl.value = bookmarks[+li.dataset.i].q;
  evaluate(); qEl.focus();
  histWrap.classList.remove('show'); bmToggle.classList.remove('open');
});
$('#clear').addEventListener('click', () => {
  bookmarks = []; renderBookmarks(); store.del('sokuto-bookmarks');
});
bmToggle.addEventListener('click', () => {
  histWrap.classList.toggle('show');
  bmToggle.classList.toggle('open');
});

// ===================== 予測サジェスト =====================
const COMMANDS = [
  { cmd: 'cp', hint: 'カラーピッカーを開く' },
  { cmd: 'color picker', hint: 'カラーピッカーを開く' },
  { cmd: 'uuid', hint: 'UUIDを生成' },
  { cmd: 'pass ', hint: 'パスワードを生成 (数字で桁数指定)' },
  { cmd: 'todo add ', hint: 'ToDoを追加' },
  { cmd: 'todo view', hint: 'ToDo一覧を見る' },
  { cmd: 'todo check ', hint: 'ToDoを完了にする' },
  { cmd: 'todo remove ', hint: 'ToDoを削除する' },
  { cmd: '2d6', hint: 'サイコロを振る' },
  { cmd: 'random ', hint: '乱数を生成' },
];
function hideSuggest() { suggestEl.classList.remove('open'); suggestEl.innerHTML = ''; }
function renderSuggest(list) {
  if (!list.length) { hideSuggest(); return; }
  suggestEl.innerHTML = list.map((c, i) =>
    '<button type="button" class="sg-chip" data-i="' + i + '">' + esc(c.cmd.trim()) +
    '<span class="sg-hint">' + esc(c.hint) + '</span></button>'
  ).join('');
  suggestEl.classList.add('open');
  [...suggestEl.children].forEach((btn, i) => btn.addEventListener('click', () => {
    qEl.value = list[i].cmd;
    evaluate();
    hideSuggest();
    qEl.focus();
    requestAnimationFrame(() => qEl.setSelectionRange(qEl.value.length, qEl.value.length));
  }));
}
function updateSuggestions() {
  const raw = qEl.value;
  const ql = raw.trim().toLowerCase();
  if (!ql) { hideSuggest(); return; }
  const todoMatch = raw.match(/^(todo\s*(?:check|remove|del|delete)\s+|ToDo\s*(?:完了|削除)\s*[:：]?\s*)(.*)$/i);
  if (todoMatch && todos.length) {
    const prefix = todoMatch[1];
    const partial = todoMatch[2].trim().toLowerCase();
    const cands = todos.filter(t => t.text.toLowerCase().includes(partial));
    renderSuggest(cands.slice(0, 6).map(t => ({ cmd: prefix + t.text, hint: t.done ? '完了済み' : '未完了' })));
    return;
  }
  const list = COMMANDS.filter(c => c.cmd.toLowerCase().startsWith(ql) && c.cmd.trim().toLowerCase() !== ql);
  renderSuggest(list.slice(0, 6));
}

// ---- 入力
qEl.addEventListener('input', () => { evaluate(); updateSuggestions(); });
qEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (current && current.regen) { evaluate(); return; }
    if (current && current.todoAdd) { commitTodoAdd(current.todoAdd); return; }
    if (current && current.todoCheck) { commitTodoCheck(current.todoCheck); return; }
    if (current && current.todoRemove) { commitTodoRemove(current.todoRemove); return; }
  }
  if (e.key === 'Escape') { qEl.value = ''; evaluate(); hideSuggest(); }
});

// ---- ヒントチップ (info ボタンで開閉)
const HINTS = ['(120+80)*1.1', '3980 + 10%', '税込 2980', '5km to mi', '30c to f',
               '12/25', 'today + 90日', '7/5 〜 12/25', '#1e90ff', '0xff',
               '2d6', 'pass 20', 'uuid', 'todo add 牛乳を買う', 'todo view', 'todo check 牛乳', 'todo remove 牛乳'];
for (const h of HINTS) {
  const b = document.createElement('button');
  b.className = 'chip'; b.type = 'button'; b.textContent = h;
  b.addEventListener('click', () => { qEl.value = h; evaluate(); qEl.focus(); hintsEl.classList.remove('open'); infoBtn.classList.remove('on'); });
  hintsEl.appendChild(b);
}
infoBtn.addEventListener('click', () => {
  hintsEl.classList.toggle('open');
  infoBtn.classList.toggle('on');
});

// ---- 起動
(async () => {
  if (store.ok) {
    const savedB = await store.get('sokuto-bookmarks');
    if (Array.isArray(savedB)) { bookmarks = savedB.slice(0, 50); renderBookmarks(); }
    const savedT = await store.get('sokuto-todos');
    if (Array.isArray(savedT)) { todos = savedT; }
  }
  qEl.focus();
})();

</script>
