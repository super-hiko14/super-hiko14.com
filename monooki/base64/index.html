<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f7f5f2;
            --surface: #ffffff;
            --border: #e8e3dc;
            --text-primary: #2a2520;
            --text-secondary: #9c9189;
            --text-muted: #c4bdb5;
            --accent: #b09a82;
            --accent-light: #d4c4b0;
            --success: #8aad96;
            --error: #c4847a;
            --code-bg: #f4f1ed;
        }

        .dark {
            --bg: #1c1a18;
            --surface: #242220;
            --border: #35302b;
            --text-primary: #ede8e2;
            --text-secondary: #8a8078;
            --text-muted: #554f48;
            --accent: #b09a82;
            --accent-light: #7a6a58;
            --code-bg: #1a1816;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 300;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
        }

        /* ── ヘッダー ── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 720px;
            margin: 0 auto;
            width: 100%;
            padding: 2rem 1.5rem 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .logo-mark {
            width: 32px;
            height: 32px;
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            color: var(--accent);
            transition: border-color 0.3s;
        }

        .logo-name {
            font-size: 0.72rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        /* ── テーマ切替 ── */
        .theme-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .theme-btn:hover { border-color: var(--accent); color: var(--accent); }
        .icon-sun  { display: none; }
        .icon-moon { display: block; }
        .dark .icon-sun  { display: block; }
        .dark .icon-moon { display: none; }

        /* ── メイン ── */
        main {
            flex: 1;
            max-width: 720px;
            margin: 0 auto;
            width: 100%;
            padding: 3rem 1.5rem 5rem;
            animation: fadeUp 0.8s ease both;
        }

        /* ── ページタイトル ── */
        .page-title {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .page-title h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            letter-spacing: 0.1em;
            line-height: 1.1;
        }

        .page-title h1 em { font-style: italic; color: var(--accent); }

        .page-title p {
            margin-top: 0.6rem;
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            line-height: 1.8;
        }

        /* ── ドロップエリア ── */
        .drop-area {
            border: 1px dashed var(--border);
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            border-radius: 2px;
            transition: border-color 0.2s, background 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
        }

        .drop-area:hover, .drop-area.drag-over {
            border-color: var(--accent-light);
            background: var(--surface);
        }

        .drop-icon {
            width: 40px;
            height: 40px;
            stroke: var(--text-muted);
            transition: stroke 0.2s;
            margin-bottom: 0.2rem;
        }

        .drop-area:hover .drop-icon { stroke: var(--accent); }

        .drop-area .label-main {
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
        }

        .drop-area .label-sub {
            font-size: 0.68rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* ── 結果エリア ── */
        .result-section { margin-top: 2rem; display: none; }

        .section-label {
            font-size: 0.65rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-size-badge {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            font-family: 'Noto Sans JP', monospace;
        }

        /* ── プレビュー ── */
        .preview-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 160px;
            margin-bottom: 2rem;
        }

        .preview-box img {
            max-width: 100%;
            max-height: 360px;
            object-fit: contain;
        }

        /* ── コード出力 ── */
        .code-wrapper { position: relative; }

        textarea {
            width: 100%;
            height: 10rem;
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 1rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.72rem;
            color: var(--text-secondary);
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: border-color 0.2s, background 0.3s;
            cursor: text;
        }

        textarea:focus { border-color: var(--accent); }

        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── コピーボタン ── */
        .copy-btn {
            margin-top: 0.75rem;
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            background: transparent;
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 300;
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 1px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .copy-btn:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        .copy-btn svg { width: 14px; height: 14px; stroke: currentColor; }

        /* ── トースト ── */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(0);
            background: var(--text-primary);
            color: var(--bg);
            padding: 0.6rem 1.4rem;
            border-radius: 1px;
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-4px);
        }

        /* ── フッター ── */
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.62rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-mark">B</div>
        <span class="logo-name">Base64 Converter</span>
    </div>
    <button class="theme-btn" id="themeToggle" aria-label="テーマ切り替え">
        <!-- 月（ライトモード時） -->
        <svg class="icon-moon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
        <!-- 太陽（ダークモード時） -->
        <svg class="icon-sun" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
    </button>
</header>

<main>
    <div class="page-title">
        <h1>Image <em>to</em> Base64</h1>
        <p>画像ファイルをData URLに変換します<br>サーバーへの送信は一切ありません</p>
    </div>

    <div class="drop-area" id="dropArea">
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <svg class="drop-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <span class="label-main">画像をここにドロップ</span>
        <span class="label-sub">またはクリックして選択</span>
    </div>

    <div class="result-section" id="result">

        <div class="section-label">
            <span>Preview</span>
            <span class="file-size-badge" id="fileSize"></span>
        </div>
        <div class="preview-box">
            <img id="preview" alt="Preview" src="">
        </div>

        <div class="section-label">Data URL</div>
        <div class="code-wrapper">
            <textarea id="dataUrlText" readonly onclick="this.select()"></textarea>
        </div>
        <button class="copy-btn" onclick="copyText()">
            <svg fill="none" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
            </svg>
            Copy
        </button>
    </div>
</main>

<footer>© 高級ジェネ™</footer>

<div class="toast" id="toast"></div>

<script>
    const dropArea   = document.getElementById('dropArea');
    const fileInput  = document.getElementById('fileInput');
    const dataUrlText= document.getElementById('dataUrlText');
    const preview    = document.getElementById('preview');
    const resultDiv  = document.getElementById('result');
    const fileSizeSpan=document.getElementById('fileSize');
    const toastEl    = document.getElementById('toast');
    const themeToggle= document.getElementById('themeToggle');

    // テーマ
    const savedTheme = localStorage.getItem('b64_theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }

    themeToggle.addEventListener('click', () => {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('b64_theme', isDark ? 'dark' : 'light');
    });

    // ドロップ
    dropArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

    dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
    dropArea.addEventListener('drop', e => {
        e.preventDefault();
        dropArea.classList.remove('drag-over');
        if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
        if (!file.type.startsWith('image/')) { showToast('画像ファイルを選択してください', true); return; }
        fileSizeSpan.textContent = (file.size / 1024).toFixed(1) + ' KB';
        const reader = new FileReader();
        reader.onload = e => {
            dataUrlText.value = e.target.result;
            preview.src = e.target.result;
            resultDiv.style.display = 'block';
            setTimeout(() => resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
        };
        reader.readAsDataURL(file);
    }

    function copyText() {
        if (!dataUrlText.value) return;
        dataUrlText.select();
        if (navigator.clipboard?.writeText) {
            navigator.clipboard.writeText(dataUrlText.value).then(() => showToast('コピーしました')).catch(() => { document.execCommand('copy'); showToast('コピーしました'); });
        } else {
            document.execCommand('copy');
            showToast('コピーしました');
        }
    }

    let toastTimer;
    function showToast(msg, isError = false) {
        toastEl.textContent = msg;
        toastEl.style.background = isError ? 'var(--error)' : 'var(--text-primary)';
        toastEl.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
    }
</script>
</body>
</html>
