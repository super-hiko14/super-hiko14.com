<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polygon Art</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f7f5f2;
            --surface: #ffffff;
            --border: #e8e3dc;
            --text-primary: #2a2520;
            --text-secondary: #9c9189;
            --text-muted: #c4bdb5;
            --accent: #b09a82;
            --accent-light: #d4c4b0;
            --success: #8aad96;
            --error: #c4847a;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 300;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 3rem 1.5rem 5rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeUp 0.8s ease both;
        }

        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(2rem, 5vw, 3rem);
            letter-spacing: 0.12em;
            color: var(--text-primary);
            line-height: 1.1;
        }

        header h1 em {
            font-style: italic;
            color: var(--accent);
        }

        header p {
            margin-top: 0.6rem;
            font-size: 0.72rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .card {
            max-width: 760px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 2.5rem 2.5rem 2rem;
            animation: fadeUp 0.8s 0.1s ease both;
        }

        .form-group { margin-bottom: 2rem; }

        .form-label {
            display: block;
            font-size: 0.68rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px dashed var(--border);
            border-radius: 1px;
            padding: 2.2rem;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            gap: 0.5rem;
        }

        .upload-area:hover, .upload-area.dragover { border-color: var(--accent); background: #faf8f5; }

        .upload-area svg {
            width: 28px;
            height: 28px;
            stroke: var(--text-muted);
            transition: stroke 0.2s;
        }

        .upload-area:hover svg, .upload-area.dragover svg { stroke: var(--accent); }

        .upload-area span {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .slider-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.6rem;
        }

        .slider-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--accent);
            line-height: 1;
        }

        input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; background: transparent; height: 20px; outline: none; }
        input[type="range"]::-webkit-slider-runnable-track { height: 4px; background: var(--border); border-radius: 2px; border: none; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: var(--surface);
            border: 1.5px solid var(--accent);
            cursor: pointer;
            margin-top: -6px;
            transition: background 0.2s, transform 0.15s, border-color 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { background: var(--accent-light); transform: scale(1.15); }
        
        input[type="range"]::-moz-range-track { height: 4px; background: var(--border); border-radius: 2px; border: none; }
        input[type="range"]::-moz-range-thumb {
            width: 16px; height: 16px;
            border-radius: 50%;
            background: var(--surface);
            border: 1.5px solid var(--accent);
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, border-color 0.2s;
            box-sizing: border-box;
        }
        input[type="range"]::-moz-range-thumb:hover { background: var(--accent-light); transform: scale(1.15); }

        .slider-hints {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        input[type="text"] {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--border);
            background: transparent;
            padding: 0.5rem 0;
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 300;
            font-size: 0.85rem;
            color: var(--text-primary);
            letter-spacing: 0.04em;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--accent); }
        input[type="text"]::placeholder { color: var(--text-muted); }

        .divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

        .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }

        .btn {
            flex: 1;
            min-width: 100px;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            background: transparent;
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 300;
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 1px;
            transition: all 0.2s;
        }

        .btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #faf8f5; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-generate { border-color: var(--text-primary); color: var(--text-primary); }
        .btn-generate:hover:not(:disabled) { background: var(--text-primary); color: var(--surface); }

        .canvas-wrapper { margin-top: 2rem; border: 1px solid var(--border); overflow: hidden; background: var(--bg); }
        #artCanvas { display: block; width: 100%; height: auto; }

        #messageBox {
            margin-top: 1.2rem;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-align: center;
            padding: 0.7rem 1rem;
            border-radius: 1px;
            display: none;
        }
        #messageBox.success { background: #f0f6f2; color: var(--success); }
        #messageBox.error   { background: #fdf3f2; color: var(--error); }

        footer {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.62rem;
            letter-spacing: 0.18em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <h1>Polygon <em>Art</em></h1>
    <p>画像をポリゴンに変換する</p>
</header>

<div class="card">

    <div class="form-group">
        <label class="form-label">Image</label>
        <label for="imageUpload" class="upload-area">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
            <span>クリック、ドラッグ＆ドロップ、または貼り付け</span>
            <input type="file" id="imageUpload" accept="image/*" style="display:none" />
        </label>
    </div>

    <div class="form-group">
        <div class="slider-row">
            <label class="form-label" style="margin-bottom:0">Density</label>
            <span class="slider-value" id="pointCountDisplay">500</span>
        </div>
        <input type="range" id="pointCount" min="100" max="2000" value="500" step="50" />
        <div class="slider-hints"><span>粗い</span><span>細密</span></div>
    </div>

    <div class="form-group">
        <div class="slider-row">
            <label class="form-label" style="margin-bottom:0">Resolution</label>
            <span class="slider-value" id="resolutionDisplay">- px</span>
        </div>
        
        <button id="toggleResolutionButton" class="btn" style="width:100%; margin-top:0.5rem;" disabled>解像度を変更する</button>
        
        <div id="resolutionInputArea" style="display: none; margin-top: 0.75rem; gap: 0.75rem; align-items: center; animation: fadeUp 0.3s ease both;">
            <div style="flex: 1; display: flex; align-items: center; gap: 0.35rem;">
                <span style="font-size: 0.65rem; letter-spacing: 0.1em; color: var(--text-secondary); text-transform: uppercase;">W:</span>
                <input type="number" id="newWidthInput" min="50" max="10000" placeholder="Width" style="width: 100%; border: none; border-bottom: 1px solid var(--border); padding: 0.3rem 0; font-family: 'Noto Sans JP', sans-serif; font-size: 0.85rem; outline: none; background: transparent; color: var(--text-primary);" />
            </div>
            <div style="flex: 1; display: flex; align-items: center; gap: 0.35rem;">
                <span style="font-size: 0.65rem; letter-spacing: 0.1em; color: var(--text-secondary); text-transform: uppercase;">H:</span>
                <input type="number" id="newHeightInput" min="50" max="10000" placeholder="Height" style="width: 100%; border: none; border-bottom: 1px solid var(--border); padding: 0.3rem 0; font-family: 'Noto Sans JP', sans-serif; font-size: 0.85rem; outline: none; background: transparent; color: var(--text-primary);" />
            </div>
            <button id="applyResolutionButton" class="btn btn-generate" style="flex: none; min-width: 70px; padding: 0.4rem 0.5rem; font-size: 0.65rem;">適用</button>
        </div>
    </div>

    <button id="generateButton" class="btn btn-generate" style="width:100%" disabled>Generate</button>

    <hr class="divider">

    <div class="form-group">
        <label class="form-label" for="fileNameInput">Filename</label>
        <input type="text" id="fileNameInput" placeholder="Polygon(省略可)" />
    </div>

    <span class="form-label">Download</span>
    <div class="btn-row">
        <button id="downloadPngButton"  class="btn" disabled>PNG</button>
        <button id="downloadWebpButton" class="btn" disabled>WebP</button>
        <button id="downloadJpgButton"  class="btn" disabled>JPG</button>
        <button id="downloadSvgButton"  class="btn" disabled>SVG</button>
    </div>

    <div class="canvas-wrapper">
        <canvas id="artCanvas" width="800" height="450"></canvas>
    </div>

    <div id="messageBox"></div>
</div>

<footer>© 高級ジェネ™</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { Delaunay } from "https://cdn.jsdelivr.net/npm/d3-delaunay@6/+esm";

    setLogLevel('error');

    const isLocalEnvironment = typeof __app_id === 'undefined';
    const appId = isLocalEnvironment ? 'default-app-id' : __app_id;
    const firebaseConfig = isLocalEnvironment ? {} : JSON.parse(__firebase_config);
    const initialAuthToken = isLocalEnvironment ? null : __initial_auth_token;

    let app, db, auth, currentImage = null;
    let aspectRatio = 16 / 9;
    let lastPoints = null;
    let lastColors = null;
    let lastVoronoi = null;

    const canvas            = document.getElementById('artCanvas');
    const ctx               = canvas.getContext('2d', { willReadFrequently: true });
    const imageUpload       = document.getElementById('imageUpload');
    const pointCountInput   = document.getElementById('pointCount');
    const pointCountDisplay = document.getElementById('pointCountDisplay');
    const generateButton    = document.getElementById('generateButton');
    const downloadPngButton = document.getElementById('downloadPngButton');
    const downloadWebpButton= document.getElementById('downloadWebpButton');
    const downloadJpgButton = document.getElementById('downloadJpgButton');
    const downloadSvgButton = document.getElementById('downloadSvgButton');
    const fileNameInput     = document.getElementById('fileNameInput');
    const messageBox        = document.getElementById('messageBox');
    
    const resolutionDisplay      = document.getElementById('resolutionDisplay');
    const toggleResolutionButton = document.getElementById('toggleResolutionButton');
    const resolutionInputArea    = document.getElementById('resolutionInputArea');
    const newWidthInput          = document.getElementById('newWidthInput');
    const newHeightInput          = document.getElementById('newHeightInput');
    const applyResolutionButton  = document.getElementById('applyResolutionButton');
    const uploadArea             = document.querySelector('.upload-area');

    function handleImageLoaded(img) {
        currentImage = img;
        aspectRatio = img.height / img.width;
        
        const w = img.width;
        const h = img.height;
        
        canvas.width = w;
        canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);
        
        resolutionDisplay.textContent = `${w} × ${h} px`;
        newWidthInput.value = w;
        newHeightInput.value = h;
        
        toggleResolutionButton.disabled = false;
        generateButton.disabled = false;
        setDownloadButtonsDisabled(true);
    }

    function loadPlaceholderImage() {
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = () => {
            handleImageLoaded(img);
        };
        img.onerror = () => showMessage('プレースホルダーの読み込みに失敗しました。', 'error');
        img.src = "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=450&fit=crop";
    }

    async function initializeFirebase() {
        try {
            if (Object.keys(firebaseConfig).length === 0) return;
            app  = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db   = getFirestore(app);
            if (initialAuthToken) await signInWithCustomToken(auth, initialAuthToken);
            else await signInAnonymously(auth);
        } catch (e) { console.error("Firebase error:", e); }
    }

    function showMessage(msg, type = 'info') {
        messageBox.textContent = msg;
        messageBox.className = type;
        messageBox.style.display = 'block';
        setTimeout(() => { messageBox.style.display = 'none'; }, 4000);
    }

    function downloadArt(mimeType, extension, quality = 1.0) {
        let baseName = fileNameInput.value.trim().replace(/[^a-zA-Z0-9_\-あ-ん]/g, '_') || 'Polygon';
        const dataURL = canvas.toDataURL(mimeType, quality);
        const a = document.createElement('a');
        a.href = dataURL;
        a.download = `${baseName}.${extension}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        showMessage(`${extension.toUpperCase()} でダウンロードしました — ${baseName}.${extension}`, 'success');
    }

    function downloadSvg() {
        if (!lastPoints) return;
        const width = canvas.width;
        const height = canvas.height;
        let baseName = fileNameInput.value.trim().replace(/[^a-zA-Z0-9_\-あ-ん]/g, '_') || 'Polygon';
        
        const delaunay = Delaunay.from(lastPoints.map(p => [p.x, p.y]));
        const voronoi = delaunay.voronoi([0, 0, width, height]);
        
        let svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} ${height}" width="${width}" height="${height}">\n`;
        svgContent += `  <rect width="${width}" height="${height}" fill="black" />\n`;
        
        for (let i = 0; i < lastPoints.length; i++) {
            const cell = voronoi.cellPolygon(i);
            if (!cell) continue;
            
            // 面積を計算（極細・極小セルの検出用）
            let area = 0;
            for (let j = 0; j < cell.length; j++) {
                const next = (j + 1) % cell.length;
                area += cell[j][0] * cell[next][1] - cell[next][0] * cell[j][1];
            }
            area = Math.abs(area) / 2;
            
            // 面積が極小のポリゴンは枠線を極細にして目立たなくする
            const strokeWidth = area < 16 ? "0.1" : "1.2";
            
            const p = lastPoints[i];
            const colorStr = `rgb(${p.r},${p.g},${p.b})`;
            const pointsStr = cell.map(pt => `${pt[0].toFixed(1)},${pt[1].toFixed(1)}`).join(' ');
            svgContent += `  <polygon points="${pointsStr}" fill="${colorStr}" stroke="${colorStr}" stroke-width="${strokeWidth}" stroke-linejoin="round" />\n`;
        }
        svgContent += `</svg>`;
        
        const blob = new Blob([svgContent], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${baseName}.svg`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        showMessage(`SVG でダウンロードしました — ${baseName}.svg`, 'success');
    }

    function setDownloadButtonsDisabled(disabled) {
        downloadPngButton.disabled  = disabled;
        downloadWebpButton.disabled = disabled;
        downloadJpgButton.disabled  = disabled;
        downloadSvgButton.disabled  = disabled;
    }

    function loadImageFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                handleImageLoaded(img);
                showMessage('画像を読み込みました', 'success');
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        uploadArea.addEventListener(eventName, (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        uploadArea.addEventListener(eventName, (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
        }, false);
    });

    uploadArea.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files.length > 0) {
            const file = files[0];
            if (file.type.startsWith('image/')) {
                loadImageFile(file);
            } else {
                showMessage('画像ファイルを選択してください', 'error');
            }
        }
    });

    imageUpload.addEventListener('change', (event) => {
        const file = event.target.files[0];
        if (!file) return;
        loadImageFile(file);
    });

    window.addEventListener('paste', (e) => {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
                const file = items[i].getAsFile();
                loadImageFile(file);
                break;
            }
        }
    });

    pointCountInput.addEventListener('input', () => {
        pointCountDisplay.textContent = pointCountInput.value;
    });

    toggleResolutionButton.addEventListener('click', () => {
        const isHidden = resolutionInputArea.style.display === 'none';
        resolutionInputArea.style.display = isHidden ? 'flex' : 'none';
        if (isHidden) {
            newWidthInput.value = canvas.width;
            newHeightInput.value = canvas.height;
        }
    });

    newWidthInput.addEventListener('input', () => {
        const w = parseInt(newWidthInput.value);
        if (!isNaN(w) && w > 0) {
            newHeightInput.value = Math.round(w * aspectRatio);
        } else {
            newHeightInput.value = '';
        }
    });

    newHeightInput.addEventListener('input', () => {
        const h = parseInt(newHeightInput.value);
        if (!isNaN(h) && h > 0) {
            newWidthInput.value = Math.round(h / aspectRatio);
        } else {
            newWidthInput.value = '';
        }
    });

    applyResolutionButton.addEventListener('click', () => {
        const w = parseInt(newWidthInput.value);
        const h = parseInt(newHeightInput.value);
        if (isNaN(w) || w <= 0 || isNaN(h) || h <= 0) {
            showMessage('有効な解像度を入力してください', 'error');
            return;
        }
        
        canvas.width = w;
        canvas.height = h;
        ctx.drawImage(currentImage, 0, 0, w, h);
        
        resolutionDisplay.textContent = `${w} × ${h} px`;
        resolutionInputArea.style.display = 'none';
        
        setDownloadButtonsDisabled(true);
        showMessage(`解像度を ${w} × ${h} px に変更しました`, 'success');
    });

    generateButton.addEventListener('click', () => {
        if (!currentImage) { showMessage('画像をアップロードしてください', 'error'); return; }
        generateButton.disabled = true;
        generateButton.textContent = '処理中…';
        setDownloadButtonsDisabled(true);

        setTimeout(() => {
            try {
                ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                const width = canvas.width, height = canvas.height;
                const pointCount = parseInt(pointCountInput.value);

                const points = [];
                for (let i = 0; i < pointCount; i++)
                    points.push({ x: Math.random() * width, y: Math.random() * height, r: 0, g: 0, b: 0, count: 0 });

                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const index = (y * width + x) * 4;
                        const r = data[index], g = data[index + 1], b = data[index + 2];
                        let minDistSq = Infinity, nearest = -1;
                        for (let i = 0; i < pointCount; i++) {
                            const p = points[i];
                            const d = (x - p.x) ** 2 + (y - p.y) ** 2;
                            if (d < minDistSq) { minDistSq = d; nearest = i; }
                        }
                        if (nearest !== -1) { const p = points[nearest]; p.r += r; p.g += g; p.b += b; p.count++; }
                    }
                }

                points.forEach(p => {
                    if (p.count > 0) { p.r = Math.floor(p.r / p.count); p.g = Math.floor(p.g / p.count); p.b = Math.floor(p.b / p.count); }
                });

                const outputData = new Uint8ClampedArray(data.length);
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const index = (y * width + x) * 4;
                        let minDistSq = Infinity, nearest = -1;
                        for (let i = 0; i < pointCount; i++) {
                            const p = points[i];
                            const d = (x - p.x) ** 2 + (y - p.y) ** 2;
                            if (d < minDistSq) { minDistSq = d; nearest = i; }
                        }
                        if (nearest !== -1) {
                            const p = points[nearest];
                            outputData[index] = p.r; outputData[index + 1] = p.g;
                            outputData[index + 2] = p.b; outputData[index + 3] = 255;
                        }
                    }
                }

                ctx.putImageData(new ImageData(outputData, width, height), 0, 0);

                lastPoints = points;

                showMessage('生成が完了しました', 'success');
                setDownloadButtonsDisabled(false);
            } catch (e) {
                console.error(e);
                showMessage('生成中にエラーが発生しました', 'error');
            } finally {
                generateButton.disabled = false;
                generateButton.textContent = 'Generate';
            }
        }, 50);
    });

    downloadPngButton.addEventListener('click',  () => { if (!downloadPngButton.disabled)  downloadArt('image/png',  'png'); });
    downloadWebpButton.addEventListener('click', () => { if (!downloadWebpButton.disabled) downloadArt('image/webp', 'webp', 0.9); });
    downloadJpgButton.addEventListener('click',  () => { if (!downloadJpgButton.disabled)  downloadArt('image/jpeg', 'jpg',  0.9); });
    downloadSvgButton.addEventListener('click',  () => { if (!downloadSvgButton.disabled)  downloadSvg(); });

    window.onload = () => {
        initializeFirebase();
        loadPlaceholderImage();
        generateButton.disabled = true;
        pointCountInput.value = 500;
        pointCountDisplay.textContent = 500;
    };
</script>
</body>
</html>
