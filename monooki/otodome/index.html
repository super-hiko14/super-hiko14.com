<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おとどめ — 超シンプルなレコーダー</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0e;--s1:#161616;--s2:#1c1c1c;--s3:#252525;
  --b1:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.13);--b3:rgba(255,255,255,0.22);
  --text:#f0ede8;--muted:rgba(240,237,232,0.42);--dim:rgba(240,237,232,0.2);
  --acc:#e8432d;--acc2:#ff6b52;
  --mono:'DM Mono',monospace;--sans:'Noto Sans JP',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:48px 20px 80px}
header{width:100%;max-width:520px;display:flex;align-items:center;gap:10px;margin-bottom:36px}
header h1{font-family:var(--mono);font-size:12px;font-weight:400;letter-spacing:.22em;
  text-transform:uppercase;color:var(--muted)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--acc);opacity:0;
  transition:opacity .3s;flex-shrink:0}
.live-dot.on{opacity:1;animation:blink 1.1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.card{width:100%;max-width:520px;background:var(--s1);border:1px solid var(--b1);
  border-radius:18px;padding:28px 28px 24px;margin-bottom:14px}
.wave-wrap{height:72px;margin-bottom:24px;border-radius:8px;overflow:hidden}
#waveCanvas{width:100%;height:72px;display:block}
.timer-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px}
#timer{font-family:var(--mono);font-size:44px;font-weight:300;letter-spacing:.03em;
  line-height:1;color:var(--text);font-variant-numeric:tabular-nums}
.state-col{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
#stateLabel{font-family:var(--mono);font-size:10px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--muted)}
#stateLabel.rec{color:var(--acc2)}
#formatBadge{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--dim);border:1px solid var(--b1);border-radius:4px;padding:2px 6px}
.btn-row{display:flex;justify-content:center}
#recBtn{width:76px;height:76px;border-radius:50%;border:1.5px solid var(--b2);
  background:var(--s2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  outline:none;transition:border-color .2s,transform .12s}
#recBtn:hover{border-color:var(--b3)}
#recBtn:active{transform:scale(.93)}
.rec-shape{width:28px;height:28px;border-radius:50%;background:var(--acc);
  transition:border-radius .22s cubic-bezier(.4,0,.2,1),width .22s,height .22s,background .2s}
#recBtn.recording .rec-shape{border-radius:6px;width:23px;height:23px;background:#fff}
#errMsg{font-family:var(--mono);font-size:11px;color:var(--acc2);text-align:center;
  margin-top:14px;min-height:14px}
.list-wrap{width:100%;max-width:520px}
.list-label{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--dim);margin-bottom:10px}
.empty-msg{font-family:var(--mono);font-size:12px;color:var(--dim);text-align:center;
  padding:28px 0;letter-spacing:.06em}
.rec-item{background:var(--s1);border:1px solid var(--b1);border-radius:14px;
  padding:14px 16px;margin-bottom:8px;animation:slideUp .22s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.rec-top{display:flex;align-items:center;gap:8px}
.rec-name{flex:1;font-family:var(--mono);font-size:13px;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-dur{font-family:var(--mono);font-size:11px;color:var(--muted);
  flex-shrink:0;font-variant-numeric:tabular-nums}
.icon-btn{width:30px;height:30px;border-radius:8px;flex-shrink:0;
  border:1px solid var(--b1);background:none;cursor:pointer;color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  transition:border-color .15s,color .15s,background .15s;text-decoration:none}
.icon-btn:hover{border-color:var(--b2);color:var(--text);background:var(--s3)}
.icon-btn.playing{border-color:var(--b3);color:var(--text);background:var(--s3)}
.icon-btn svg{width:14px;height:14px}
.player-wrap{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--b1)}
.player-wrap.open{display:flex;flex-direction:column;gap:10px}
.seek-row{display:flex;align-items:center;gap:10px}
.time-label{font-family:var(--mono);font-size:10px;color:var(--muted);
  white-space:nowrap;font-variant-numeric:tabular-nums;min-width:32px}
.time-label.right{text-align:right}
.track{flex:1;height:3px;background:var(--s3);border-radius:999px;
  position:relative;cursor:pointer;user-select:none}
.track-fill{height:100%;border-radius:999px;background:var(--acc);pointer-events:none}
.track-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);
  width:11px;height:11px;border-radius:50%;background:var(--text);pointer-events:none}
.ctrl-row{display:flex;align-items:center;gap:8px}
.play-btn{width:34px;height:34px;border-radius:50%;flex-shrink:0;
  border:1px solid var(--b2);background:var(--s2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--text);
  transition:background .15s,border-color .15s,transform .1s}
.play-btn:hover{background:var(--s3);border-color:var(--b3)}
.play-btn:active{transform:scale(.92)}
.play-btn svg{width:14px;height:14px}
.vol-row{display:flex;align-items:center;gap:6px;margin-left:auto}
.vol-icon{color:var(--muted)}
.vol-icon svg{width:13px;height:13px;display:block}
.vol-track{width:64px;height:3px;background:var(--s3);border-radius:999px;
  position:relative;cursor:pointer;user-select:none}
.vol-fill{height:100%;border-radius:999px;background:var(--b3);pointer-events:none}
.vol-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);
  width:10px;height:10px;border-radius:50%;background:var(--text);pointer-events:none}
@media(max-width:480px){
  body{padding:28px 14px 60px}.card{padding:22px 18px 20px}#timer{font-size:36px}}
</style>
</head>
<body>
<header>
  <h1>おとどめ</h1>
  <div class="live-dot" id="liveDot"></div>
</header>
<div class="card">
  <div class="wave-wrap"><canvas id="waveCanvas"></canvas></div>
  <div class="timer-row">
    <div id="timer">0:00.0</div>
    <div class="state-col">
      <span id="stateLabel">待機中</span>
      <span id="formatBadge">OGG</span>
    </div>
  </div>
  <div class="btn-row">
    <button id="recBtn" aria-label="録音開始/停止"><div class="rec-shape"></div></button>
  </div>
  <div id="errMsg"></div>
</div>
<div class="list-wrap">
  <p class="list-label" id="listLabel" style="display:none">録音一覧</p>
  <div id="recList"><p class="empty-msg">録音がありません</p></div>
</div>
<script>
const recBtn=document.getElementById('recBtn');
const timerEl=document.getElementById('timer');
const stateLabel=document.getElementById('stateLabel');
const liveDot=document.getElementById('liveDot');
const errMsg=document.getElementById('errMsg');
const recList=document.getElementById('recList');
const listLabel=document.getElementById('listLabel');
const formatBadge=document.getElementById('formatBadge');
const canvas=document.getElementById('waveCanvas');
const cx=canvas.getContext('2d');

let mediaRecorder=null,audioCtx=null,analyser=null,animId=null;
let chunks=[],recordings=[],recCount=0;
let startTime=0,timerIv=null,isRecording=false;

let db=null;
const DB_NAME='RecorderDB',DB_STORE='recordings',DB_VERSION=1;
function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,DB_VERSION);
    req.onupgradeneeded=()=>{
      if(!req.result.objectStoreNames.contains(DB_STORE))req.result.createObjectStore(DB_STORE,{keyPath:'id'});
    };
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
function dbGetAll(){
  return new Promise((resolve,reject)=>{
    const req=db.transaction(DB_STORE,'readonly').objectStore(DB_STORE).getAll();
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
function dbAdd(record){
  db.transaction(DB_STORE,'readwrite').objectStore(DB_STORE).add(record);
}
function dbDelete(id){
  db.transaction(DB_STORE,'readwrite').objectStore(DB_STORE).delete(id);
}
async function loadRecordings(){
  db=await openDB();
  const items=await dbGetAll();
  items.sort((a,b)=>b.id-a.id);
  recordings=items.map(it=>({id:it.id,url:URL.createObjectURL(it.blob),blob:it.blob,ext:it.ext,dur:it.dur,name:it.name}));
  recCount=items.reduce((m,it)=>Math.max(m,it.id),0);
  renderList();
}

const PREFER=['audio/ogg;codecs=opus','audio/ogg','audio/webm;codecs=opus','audio/webm'];
const supportedMime=PREFER.find(t=>MediaRecorder.isTypeSupported(t))||'';
const isOgg=supportedMime.includes('ogg');
formatBadge.textContent=isOgg?'OGG':'WEBM';

function setupCanvas(){
  const dpr=devicePixelRatio||1,r=canvas.getBoundingClientRect();
  canvas.width=r.width*dpr;canvas.height=r.height*dpr;cx.scale(dpr,dpr);
}
function drawIdle(){
  const w=canvas.getBoundingClientRect().width,h=72;
  cx.clearRect(0,0,w,h);
  const step=Math.ceil(w/48);
  for(let x=0;x<w;x+=step){
    const th=(x%(step*3)===0)?8:3;
    cx.strokeStyle='rgba(255,255,255,0.06)';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(x,h/2-th/2);cx.lineTo(x,h/2+th/2);cx.stroke();
  }
  cx.strokeStyle='rgba(255,255,255,0.08)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(0,h/2);cx.lineTo(w,h/2);cx.stroke();
}
function drawWave(){
  animId=requestAnimationFrame(drawWave);
  const buf=new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(buf);
  const w=canvas.getBoundingClientRect().width,h=72;
  cx.clearRect(0,0,w,h);
  cx.lineWidth=1.5;cx.strokeStyle='#e8432d';cx.lineJoin='round';
  cx.beginPath();
  const sw=w/buf.length;
  for(let i=0;i<buf.length;i++){
    const y=(buf[i]/128)*h/2;
    i===0?cx.moveTo(0,y):cx.lineTo(i*sw,y);
  }
  cx.stroke();
}

function fmtMs(ms){
  const t=Math.floor(ms/1000),d=Math.floor((ms%1000)/100);
  return `${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}.${d}`;
}
function fmtSec(s){
  s=Math.max(0,Math.floor(s||0));
  return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}

async function startRec(){
  errMsg.textContent='';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new AudioContext();
    analyser=audioCtx.createAnalyser();analyser.fftSize=2048;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    mediaRecorder=new MediaRecorder(stream,supportedMime?{mimeType:supportedMime}:{});
    chunks=[];
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)};
    mediaRecorder.onstop=finishRec;
    mediaRecorder.start(100);
    isRecording=true;startTime=Date.now();
    timerIv=setInterval(()=>timerEl.textContent=fmtMs(Date.now()-startTime),100);
    recBtn.classList.add('recording');
    stateLabel.textContent='REC';stateLabel.classList.add('rec');
    liveDot.classList.add('on');
    setupCanvas();drawWave();
  }catch(e){
    errMsg.textContent='マイクへのアクセスが許可されていません';
  }
}
function stopRec(){
  if(!mediaRecorder)return;
  window._lastDur=Date.now()-startTime;
  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t=>t.stop());
  cancelAnimationFrame(animId);clearInterval(timerIv);
  audioCtx.close();isRecording=false;
  recBtn.classList.remove('recording');
  stateLabel.textContent='待機中';stateLabel.classList.remove('rec');
  liveDot.classList.remove('on');
  timerEl.textContent='0:00.0';
  setupCanvas();drawIdle();
}
function finishRec(){
  const dur=window._lastDur||0;
  const mime=mediaRecorder.mimeType||'audio/ogg';
  const blob=new Blob(chunks,{type:mime});
  const url=URL.createObjectURL(blob);
  const ext=mime.includes('ogg')?'ogg':'webm';
  recCount++;
  const rec={id:recCount,url,blob,ext,dur,name:`録音 ${recCount}`};
  recordings.unshift(rec);
  dbAdd({id:rec.id,blob:rec.blob,ext:rec.ext,dur:rec.dur,name:rec.name});
  renderList();
}
recBtn.addEventListener('click',()=>isRecording?stopRec():startRec());

const players={};
const PLAY_SVG=`<svg viewBox="0 0 16 16" fill="currentColor"><polygon points="3,1 14,8 3,15"/></svg>`;
const PAUSE_SVG=`<svg viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="1" width="4" height="14" rx="1"/><rect x="9" y="1" width="4" height="14" rx="1"/></svg>`;

function renderList(){
  if(!recordings.length){
    recList.innerHTML='<p class="empty-msg">録音がありません</p>';
    listLabel.style.display='none';return;
  }
  listLabel.style.display='';
  recList.innerHTML='';
  recordings.forEach(r=>{
    if(!players[r.id]){const audio=new Audio(r.url);players[r.id]={audio,playing:false,vol:1};}
    const item=document.createElement('div');
    item.className='rec-item';
    item.innerHTML=`
      <div class="rec-top">
        <span class="rec-name">${r.name}</span>
        <span class="rec-dur">${fmtSec(r.dur/1000)}</span>
        <button class="icon-btn play-toggle" data-id="${r.id}" aria-label="再生">${PLAY_SVG}</button>
        <a class="icon-btn" href="${r.url}" download="rec_${r.id}.${r.ext}" aria-label="ダウンロード" style="color:var(--muted)">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 2v8M5 8l3 3 3-3M2 14h12"/>
          </svg>
        </a>
        <button class="icon-btn del-btn" data-id="${r.id}" aria-label="削除">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 4h12M5 4V2h6v2M4 4l.7 10h6.6L12 4"/>
          </svg>
        </button>
      </div>
      <div class="player-wrap" id="pw-${r.id}">
        <div class="seek-row">
          <span class="time-label" id="cur-${r.id}">0:00</span>
          <div class="track" id="track-${r.id}">
            <div class="track-fill" id="fill-${r.id}" style="width:0%"></div>
            <div class="track-thumb" id="thumb-${r.id}" style="left:0%"></div>
          </div>
          <span class="time-label right" id="tot-${r.id}">${fmtSec(r.dur/1000)}</span>
        </div>
        <div class="ctrl-row">
          <button class="play-btn" id="playbtn-${r.id}" aria-label="再生">${PLAY_SVG}</button>
          <div class="vol-row">
            <span class="vol-icon">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
                <path d="M3 6H1v4h2l4 3V3L3 6z"/>
                <path d="M11 5c1 1 1.6 2.4 1.6 3.5S12 11 11 12"/>
              </svg>
            </span>
            <div class="vol-track" id="vt-${r.id}">
              <div class="vol-fill" id="vf-${r.id}" style="width:100%"></div>
              <div class="vol-thumb" id="vth-${r.id}" style="left:100%"></div>
            </div>
          </div>
        </div>
      </div>`;
    recList.appendChild(item);
    bindPlayer(r,players[r.id]);
  });
}

function bindPlayer(r,p){
  const audio=p.audio;
  const pw=document.getElementById(`pw-${r.id}`);
  const fill=document.getElementById(`fill-${r.id}`);
  const thumb=document.getElementById(`thumb-${r.id}`);
  const cur=document.getElementById(`cur-${r.id}`);
  const tot=document.getElementById(`tot-${r.id}`);
  const playBtn=document.getElementById(`playbtn-${r.id}`);
  const vt=document.getElementById(`vt-${r.id}`);
  const vf=document.getElementById(`vf-${r.id}`);
  const vth=document.getElementById(`vth-${r.id}`);
  const track=document.getElementById(`track-${r.id}`);
  const topBtn=document.querySelector(`.play-toggle[data-id="${r.id}"]`);

  function updateProgress(){
    if(!audio.duration)return;
    const pct=(audio.currentTime/audio.duration)*100;
    fill.style.width=pct+'%';thumb.style.left=pct+'%';
    cur.textContent=fmtSec(audio.currentTime);
    if(isFinite(audio.duration))tot.textContent=fmtSec(audio.duration);
  }
  audio.addEventListener('timeupdate',updateProgress);
  audio.addEventListener('loadedmetadata',()=>{if(isFinite(audio.duration))tot.textContent=fmtSec(audio.duration);});
  audio.addEventListener('ended',()=>{
    p.playing=false;
    playBtn.innerHTML=PLAY_SVG;topBtn.innerHTML=PLAY_SVG;topBtn.classList.remove('playing');
  });

  function pauseAll(){
    Object.entries(players).forEach(([pid,pp])=>{
      if(parseInt(pid)!==r.id&&pp.playing){
        pp.audio.pause();pp.playing=false;
        const ob=document.getElementById(`playbtn-${pid}`);
        const ot=document.querySelector(`.play-toggle[data-id="${pid}"]`);
        if(ob)ob.innerHTML=PLAY_SVG;
        if(ot){ot.innerHTML=PLAY_SVG;ot.classList.remove('playing');}
      }
    });
  }
  function togglePlay(){
    if(!pw.classList.contains('open'))pw.classList.add('open');
    pauseAll();
    if(p.playing){
      audio.pause();p.playing=false;
      playBtn.innerHTML=PLAY_SVG;topBtn.innerHTML=PLAY_SVG;topBtn.classList.remove('playing');
    }else{
      audio.play();p.playing=true;
      playBtn.innerHTML=PAUSE_SVG;topBtn.innerHTML=PAUSE_SVG;topBtn.classList.add('playing');
    }
  }
  playBtn.addEventListener('click',togglePlay);
  topBtn.addEventListener('click',togglePlay);

  function seek(clientX){
    const rect=track.getBoundingClientRect();
    const pct=Math.max(0,Math.min((clientX-rect.left)/rect.width,1));
    if(isFinite(audio.duration))audio.currentTime=pct*audio.duration;
  }
  let seekDrag=false;
  track.addEventListener('mousedown',e=>{seekDrag=true;seek(e.clientX)});
  window.addEventListener('mousemove',e=>{if(seekDrag)seek(e.clientX)});
  window.addEventListener('mouseup',()=>seekDrag=false);
  track.addEventListener('touchstart',e=>{seekDrag=true;seek(e.touches[0].clientX)},{passive:true});
  window.addEventListener('touchmove',e=>{if(seekDrag)seek(e.touches[0].clientX)},{passive:true});
  window.addEventListener('touchend',()=>seekDrag=false);

  function setVol(clientX){
    const rect=vt.getBoundingClientRect();
    const pct=Math.max(0,Math.min((clientX-rect.left)/rect.width,1));
    audio.volume=pct;p.vol=pct;
    vf.style.width=pct*100+'%';vth.style.left=pct*100+'%';
  }
  let volDrag=false;
  vt.addEventListener('mousedown',e=>{volDrag=true;setVol(e.clientX)});
  window.addEventListener('mousemove',e=>{if(volDrag)setVol(e.clientX)});
  window.addEventListener('mouseup',()=>volDrag=false);
  vt.addEventListener('touchstart',e=>{volDrag=true;setVol(e.touches[0].clientX)},{passive:true});
  window.addEventListener('touchmove',e=>{if(volDrag)setVol(e.touches[0].clientX)},{passive:true});
  window.addEventListener('touchend',()=>volDrag=false);

  document.querySelector(`.del-btn[data-id="${r.id}"]`).addEventListener('click',()=>{
    audio.pause();recordings=recordings.filter(x=>x.id!==r.id);delete players[r.id];dbDelete(r.id);renderList();
  });
}

setupCanvas();drawIdle();
window.addEventListener('resize',()=>{setupCanvas();if(!isRecording)drawIdle();});
loadRecordings();
</script>
</body>
</html>
