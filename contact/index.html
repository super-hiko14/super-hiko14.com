<script>
// お問い合わせフォーム処理
(function() {
  const form = document.getElementById('contactForm');
  if (!form) return;

  const emailInput = document.getElementById('email');
  const nameInput = document.getElementById('name');
  const messageInput = document.getElementById('message');
  const formStatus = document.getElementById('formStatus');
  
  // テキストエリア自動リサイズ機能
  function autoResizeTextarea(textarea) {
    textarea.style.height = 'auto';
    const newHeight = textarea.scrollHeight;
    textarea.style.height = newHeight + 'px';
  }

  // 入力時に高さを調整
  messageInput.addEventListener('input', function() {
    autoResizeTextarea(this);
  });

  // フォームリセット時に元の高さに戻す
  form.addEventListener('reset', function() {
    setTimeout(() => {
      messageInput.style.height = 'auto';
      messageInput.style.height = messageInput.scrollHeight + 'px';
    }, 0);
  });
  
  // バリデーション関数
  function validateEmail(email) {
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return re.test(email);
  }

  function clearErrors() {
    document.getElementById('emailError').textContent = '';
    document.getElementById('nameError').textContent = '';
    document.getElementById('messageError').textContent = '';
  }

  function showError(fieldId, message) {
    document.getElementById(fieldId).textContent = message;
  }

  function validate() {
    clearErrors();
    let isValid = true;

    if (!emailInput.value.trim()) {
      showError('emailError', 'メールアドレスを入力してください');
      isValid = false;
    } else if (!validateEmail(emailInput.value)) {
      showError('emailError', '正しいメールアドレスを入力してください');
      isValid = false;
    }

    if (!nameInput.value.trim()) {
      showError('nameError', 'お名前を入力してください');
      isValid = false;
    }

    if (!messageInput.value.trim()) {
      showError('messageError', 'お問い合わせ内容を入力してください');
      isValid = false;
    }

    return isValid;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    if (!validate()) {
      return;
    }

    const submitButton = form.querySelector('[type="submit"]');
    const originalText = submitButton.textContent;
    submitButton.disabled = true;
    submitButton.textContent = '送信中...';
    formStatus.className = 'form-status';
    formStatus.textContent = '';

    try {
      // reCAPTCHA v3 トークン取得
      const recaptchaToken = await grecaptcha.execute('6LfsiZgsAAAAANQMq3doqNAMje_TpSltoO4JiI9T', { action: 'contact' });

      const response = await fetch('/api/contact', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          email: emailInput.value,
          name: nameInput.value,
          message: messageInput.value,
          recaptchaToken,
        }),
      });

      if (response.ok) {
        formStatus.className = 'form-status form-status--success';
        formStatus.textContent = 'メールを送信しました。ご連絡ありがとうございます！';
        form.reset();
        clearErrors();
        messageInput.style.height = 'auto';
      } else {
        const data = await response.json();
        formStatus.className = 'form-status form-status--error';
        formStatus.textContent = data.message || '送信に失敗しました。もう一度お試しください。';
      }
    } catch (error) {
      console.error('Error:', error);
      formStatus.className = 'form-status form-status--error';
      formStatus.textContent = '通信エラーが発生しました。もう一度お試しください。';
    } finally {
      submitButton.disabled = false;
      submitButton.textContent = originalText;
    }
  });
})();
</script>

<script>
  (function() {
    fetch('https://discord.com/api/v9/invites/ukFH4NtDG6?with_counts=true')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var statsEl = document.getElementById('discord-stats');

        var online = data.approximate_presence_count;
        var total  = data.approximate_member_count;
        if (online !== undefined) onlineEl.textContent = online;
        if (total  !== undefined) totalEl.textContent  = total.toLocaleString('ja-JP');
        if (online !== undefined || total !== undefined) {
          statsEl.style.display = '';
        }
      })
      .catch(function() {});
  })();
</script>
<script>
  (function() {
    var YT_API_KEY = 'AIzaSyDJo93tXJfcFgn6Qe4NvJkWk35np50Xy7o';
    if (!YT_API_KEY) return;

    function fmtSubs(n) {
      n = parseInt(n, 10);
      if (isNaN(n)) return null;
      if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, '') + '万';
      if (n >= 1000)  return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
      return n.toString();
    }

    function loadSubs(handle, statsId, subsId) {
      var statsEl = document.getElementById(statsId);
      var subsEl  = document.getElementById(subsId);
      if (!statsEl || !subsEl) return;
      var url = 'https://www.googleapis.com/youtube/v3/channels'
        + '?part=statistics&forHandle=' + encodeURIComponent(handle)
        + '&key=' + YT_API_KEY;
      fetch(url)
        .then(function(r) {
          /* クォータ超過・認証エラーは非表示のまま終了 */
          if (r.status === 403 || r.status === 400 || r.status === 401) return null;
          return r.json();
        })
        .then(function(data) {
          if (!data) return;
          var item = data.items && data.items[0];
          if (!item) return;
          var count = item.statistics && item.statistics.subscriberCount;
          var fmt = fmtSubs(count);
          if (!fmt) return;
          subsEl.textContent = fmt;
          statsEl.style.display = '';
        })
        .catch(function() {});
    }

    loadSubs('@super-hiko14', 'yt-stats-hiko', 'yt-subs-hiko');
    loadSubs('@KokyuJene',    'yt-stats-kj',   'yt-subs-kj');
  })();
</script>
