<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: #fff;
      color: #000;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s ease, color 0.3s ease;
      overflow: hidden;
    }

    html[data-theme="dark"] body {
      background-color: #080808;
      color: #d0d0d0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 15% 25%, rgba(39,87,102,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 50% 65% at 85% 75%, rgba(186,255,192,0.10) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(39,87,102,0.03) 0%, transparent 80%);
      pointer-events: none;
      z-index: 0;
    }

    html[data-theme="dark"] body::before {
      background:
        radial-gradient(ellipse 70% 55% at 15% 25%, rgba(39,87,102,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 50% 65% at 85% 75%, rgba(186,255,192,0.06) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(39,87,102,0.06) 0%, transparent 80%);
    }

    .offline-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.1s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.3s forwards;
    }

    .wifi-svg {
      width: 72px;
      height: 72px;
    }

    .text-block {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
      opacity: 0;
      animation: slideUp 0.5s ease 0.5s forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .offline-label {
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: #c8c8c8;
    }

    html[data-theme="dark"] .offline-label {
      color: #303030;
    }

    .offline-title {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #275766 0%, #4a9aad 50%, #baffc0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    html[data-theme="dark"] .offline-title {
      background: linear-gradient(135deg, #5bb8cc 0%, #8de8c0 50%, #baffc0 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .offline-desc {
      font-size: 0.70rem;
      letter-spacing: 0.16em;
      color: #ccc;
      line-height: 2;
    }

    html[data-theme="dark"] .offline-desc {
      color: #2c2c2c;
    }

    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, #275766 40%, #baffc0 60%, transparent 100%);
      opacity: 0;
      animation: fadeIn 0.5s ease 0.85s forwards;
    }

    .retry-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      background: transparent;
      border: none;
      border-radius: 8px;
      font-family: sans-serif;
      font-size: 0.66rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      animation: fadeIn 0.5s ease 1.0s forwards;
      transition: transform 0.15s ease;
    }

    .retry-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 8px;
      padding: 1px;
      background: linear-gradient(135deg, #275766, #baffc0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.55;
      transition: opacity 0.25s ease;
    }

    .retry-btn:hover::before {
      opacity: 1;
    }

    .retry-btn-inner {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #275766 0%, #4a9aad 60%, #baffc0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    html[data-theme="dark"] .retry-btn-inner {
      background: linear-gradient(135deg, #7dd4e0 0%, #baffc0 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .retry-btn:active {
      transform: scale(0.97);
    }

    .retry-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      transition: transform 0.4s ease;
    }

    .retry-btn:hover .retry-icon {
      transform: rotate(180deg);
    }

    .retry-btn.spinning .retry-icon {
      animation: spin 0.7s linear;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .pulse-row {
      display: flex;
      gap: 6px;
      opacity: 0;
      animation: fadeIn 0.5s ease 1.1s forwards;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
    }

    .dot:nth-child(1) {
      background: #275766;
      animation: dotPulse 2.2s ease-in-out 0s infinite;
    }

    .dot:nth-child(2) {
      background: #5da8b5;
      animation: dotPulse 2.2s ease-in-out 0.35s infinite;
    }

    .dot:nth-child(3) {
      background: #baffc0;
      animation: dotPulse 2.2s ease-in-out 0.7s infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 0.25; transform: scale(1); }
      50%       { opacity: 0.9; transform: scale(1.5); }
    }
  </style>
</head>
<body>

  <div class="offline-wrap">

    <!-- wifi_off (Material Symbols) -->
    <div class="icon-wrap">
      <svg class="wifi-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" aria-hidden="true">
        <defs>
          <linearGradient id="wifiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#275766"/>
            <stop offset="100%" stop-color="#baffc0"/>
          </linearGradient>
        </defs>
        <path fill="url(#wifiGrad)" d="M798-120 480-440q-65 0-125 25t-101 69l-28-28q41-41 97.5-70T442-478L278-642q-47 17-100 51t-94 75l-26-28q42-42 92.5-77t95.5-53l-94-94 20-20 648 648-22 20Zm-353.5-44.5Q430-179 430-200t14.5-35.5Q459-250 480-250t35.5 14.5Q530-221 530-200t-14.5 35.5Q501-150 480-150t-35.5-14.5ZM716-358l-13.5-13.5L689-385l-65-65q20 8 50.5 26.5T734-376l-18 18Zm160-158q-77-77-178.5-120.5T480-680q-21 0-42 1.5t-38 4.5l-36-36q21-5 49-7.5t67-2.5q125 0 233 46.5T904-544l-28 28Z"/>
      </svg>
    </div>

    <div class="text-block">
      <span class="offline-label">Status</span>
      <span class="offline-title">Offline</span>
      <span class="offline-desc">
        接続が確認できません<br>
        ネットワーク環境をお確かめください
      </span>
    </div>

    <div class="divider"></div>

    <!-- reload (Material Symbols) -->
    <button class="retry-btn" onclick="handleRetry(this)">
      <span class="retry-btn-inner">
        <svg class="retry-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" aria-hidden="true">
          <defs>
            <linearGradient id="retryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#275766"/>
              <stop offset="100%" stop-color="#baffc0"/>
            </linearGradient>
          </defs>
          <path fill="url(#retryGrad)" d="M484-212q-112.23 0-190.11-77.84-77.89-77.84-77.89-190T293.89-670q77.88-78 190.11-78 72 0 134 35.5t98 98.5v-134h28v188H556v-28h142q-31-61-88-96.5T484-720q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t87-116h30q-26 85-96.5 136.5T484-212Z"/>
        </svg>
        Retry
      </span>
    </button>

    <div class="pulse-row">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

  </div>

  <script>
    const theme = localStorage.getItem('theme') ||
                  (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

    function handleRetry(btn) {
      btn.classList.add('spinning');
      setTimeout(() => {
        btn.classList.remove('spinning');
        window.location.reload();
      }, 700);
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered!'))
          .catch(err => console.error('Registration failed:', err));
      });
    }
  </script>

</body>
</html>
