<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline</title>
  <style>
@font-face {
    font-family: 'Jost';
    src: url('Jost.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

@font-face {
    font-family: 'zenkaku';
    src: url('zenkaku.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Jost', 'zenkaku', sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: #fff;
      color: #000;
      font-family: 'Jost', 'zenkaku', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s ease, color 0.3s ease;
      overflow: hidden;
    }

    html[data-theme="dark"] body {
      background-color: #080808;
      color: #d0d0d0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 15% 25%, rgba(39,87,102,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 50% 65% at 85% 75%, rgba(186,255,192,0.10) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(39,87,102,0.03) 0%, transparent 80%);
      pointer-events: none;
      z-index: 0;
    }

    html[data-theme="dark"] body::before {
      background:
        radial-gradient(ellipse 70% 55% at 15% 25%, rgba(39,87,102,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 50% 65% at 85% 75%, rgba(186,255,192,0.06) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(39,87,102,0.06) 0%, transparent 80%);
    }

    .offline-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.1s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .icon-wrap {
      position: relative;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wifi-svg {
      width: 72px;
      height: 72px;
      overflow: visible;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.3s forwards;
    }

    .slash-line {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 1.5px;
      height: 0;
      background: linear-gradient(180deg, #275766 0%, #baffc0 100%);
      border-radius: 2px;
      transform: translate(-50%, -60%) rotate(-45deg);
      transform-origin: center;
      animation: slashGrow 0.45s cubic-bezier(0.4, 0, 0.2, 1) 0.75s forwards;
    }

    @keyframes slashGrow {
      from { height: 0; opacity: 0; }
      to   { height: 86px; opacity: 1; }
    }

    .text-block {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
      opacity: 0;
      animation: slideUp 0.5s ease 0.5s forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .offline-label {
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: #c8c8c8;
    }

    html[data-theme="dark"] .offline-label {
      color: #303030;
    }

    .offline-title {
      font-size: 1.6rem;
      font-weight: normal;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #275766 0%, #4a9aad 50%, #baffc0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    html[data-theme="dark"] .offline-title {
      background: linear-gradient(135deg, #5bb8cc 0%, #8de8c0 50%, #baffc0 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .offline-desc {
      font-size: 0.70rem;
      letter-spacing: 0.16em;
      color: #ccc;
      line-height: 2;
    }

    html[data-theme="dark"] .offline-desc {
      color: #2c2c2c;
    }

    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, #275766 40%, #baffc0 60%, transparent 100%);
      opacity: 0;
      animation: fadeIn 0.5s ease 0.85s forwards;
    }

    .retry-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      background: transparent;
      border: none;
      border-radius: 24px;
      font-family: 'Jost', sans-serif;
      font-size: 0.66rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      animation: fadeIn 0.5s ease 1.0s forwards;
      transition: transform 0.15s ease;
    }

    .retry-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 8px;
      padding: 1px;
      background: linear-gradient(135deg, #275766, #baffc0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.55;
      transition: opacity 0.25s ease;
    }

    .retry-btn:hover::before {
      opacity: 1;
    }

    .retry-btn-inner {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #275766 0%, #4a9aad 60%, #baffc0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    html[data-theme="dark"] .retry-btn-inner {
      background: linear-gradient(135deg, #7dd4e0 0%, #baffc0 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .retry-btn:active {
      transform: scale(0.97);
    }

    .retry-icon {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      transition: transform 0.4s ease;
    }

    .retry-btn:hover .retry-icon {
      transform: rotate(180deg);
    }

    .retry-btn.spinning .retry-icon {
      animation: spin 0.7s linear;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .pulse-row {
      display: flex;
      gap: 6px;
      opacity: 0;
      animation: fadeIn 0.5s ease 1.1s forwards;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
    }

    .dot:nth-child(1) {
      background: #275766;
      animation: dotPulse 2.2s ease-in-out 0s infinite;
    }

    .dot:nth-child(2) {
      background: #5da8b5;
      animation: dotPulse 2.2s ease-in-out 0.35s infinite;
    }

    .dot:nth-child(3) {
      background: #baffc0;
      animation: dotPulse 2.2s ease-in-out 0.7s infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 0.25; transform: scale(1); }
      50%       { opacity: 0.9; transform: scale(1.5); }
    }
  </style>
</head>
<body>

  <div class="offline-wrap">

    <div class="icon-wrap">
<svg xmlns="http://www.w3.org/2000/svg" height="72px" viewBox="0 -960 960 960" width="72px" fill="#275766"><path d="M444.5-164.5Q430-179 430-200t14.5-35.5Q459-250 480-250t35.5 14.5Q530-221 530-200t-14.5 35.5Q501-150 480-150t-35.5-14.5ZM254-346l-28-28q50-50 114.5-78T480-480q75 0 139.5 28T734-374l-28 28q-44-44-102-69t-124-25q-66 0-124 25t-102 69ZM84-516l-28-28q81-81 189-128.5T480-720q127 0 235 47.5T904-544l-28 28q-77-77-178.5-120.5T480-680q-116 0-217.5 43.5T84-516Z"/></svg>
      <div class="slash-line"></div>
    </div>

    <div class="text-block">
      <span class="offline-label">Status</span>
      <span class="offline-title">Offline</span>
      <span class="offline-desc">
        接続が確認できません<br>
        ネットワーク環境をお確かめください
      </span>
    </div>

    <div class="divider"></div>

    <button class="retry-btn" onclick="handleRetry(this)">
      <span class="retry-btn-inner">

<svg xmlns="http://www.w3.org/2000/svg" height="12px" viewBox="0 -960 960 960" width="12px">
  <defs>
    <linearGradient id="myGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="20%" style="stop-color:#275760; stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a9aad; stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <path 
    fill="url(#myGradient)" 
    d="M484-212q-112.23 0-190.11-77.84-77.89-77.84-77.89-190T293.89-670q77.88-78 190.11-78 72 0 134 35.5t98 98.5v-134h28v188H556v-28h142q-31-61-88-96.5T484-720q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t87-116h30q-26 85-96.5 136.5T484-212Z"/>
</svg>
        Retry
      </span>
    </button>

    <div class="pulse-row">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

  </div>

  <script>
    const theme = localStorage.getItem('theme') ||
                  (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

    function handleRetry(btn) {
      btn.classList.add('spinning');
      setTimeout(() => {
        btn.classList.remove('spinning');
        window.location.reload();
      }, 700);
    }

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Service Worker registered!'))
      .catch(err => console.error('Registration failed:', err));
  });
}

  </script>

</body>
</html>
